<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<meta name="theme-color" content="#6b8f5e" />
<!-- Security headers (GitHub Pages can't set HTTP response headers, so we use meta tags) -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.emailjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.emailjs.com" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<title>Contractor Portal – Lazar Family Bakehouse</title>
<link rel="icon" type="image/x-icon" href="favicon.ico"/>
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png"/>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  EmailJS SDK is included so future activation is one uncomment away.
  Until EmailJS credentials are wired in (see CONFIG block in the script), the
  notify() function below is a console-log no-op. Nothing is sent.
-->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* ============================================================
   TOKENS
   Inherited from the LFB Wholesale Portal palette, with the
   primary accent swapped from red to sage green so this portal
   is visually distinct at a glance.
   ============================================================ */
:root {
  --cream:        #fdf6ee;
  --cream-dk:     #f3ebe0;
  --cream-lt:     #fef9f3;
  --tan:          #e4d8c8;
  --tan-dk:       #cfc0ab;
  --brown-lt:     #8b6914;
  --brown:        #3a2518;
  --brown-dk:     #2d1b0e;

  /* PRIMARY ACCENT (was red in wholesale portal — swapped to sage here) */
  --accent:       #6b8f5e;
  --accent-dk:    #527a46;
  --accent-lt:    #8ab07d;

  --gold:         #8b6914;
  --gold-lt:      #a07b1a;
  --white:        #ffffff;
  --shadow:       rgba(58,37,24,.08);
  --danger:       #c0392b;
  --danger-dk:    #962d22;
  --muted:        #5c4a3a;
  --info:         #2e86c1;
  --info-bg:      #E8F4FD;
  --warn:         #d4ac0d;
  --warn-bg:      #FEF9E7;
  --success:      #1e8449;
  --success-bg:   #EAFAF1;
  --urgent:       #e74c3c;
  --urgent-bg:    #FDEDEC;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; }
body {
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  color:var(--brown-dk);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}

/* ============================================================
   CONTRACTOR PORTAL TOP BANNER
   Solid sage-green bar, present on every screen incl. login.
   This is the at-a-glance differentiator from the (red-accented)
   wholesale portal.
   ============================================================ */
.portal-banner {
  background:var(--accent);
  color:var(--white);
  text-align:center;
  font-family:'Nunito',sans-serif;
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.22em;
  text-transform:uppercase;
  padding:6px 8px;
  position:sticky;
  top:0;
  z-index:200;
  border-bottom:1px solid rgba(0,0,0,.08);
}

/* ============================================================
   LOGIN
   ============================================================ */
#login-screen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:var(--cream);
  padding:0 0 24px;
}
#login-screen .login-inner {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  width:100%;
  padding:32px 18px;
}
.login-logo { text-align:center; margin-bottom:28px; }
.login-logo .mark {
  width:64px; height:64px;
  background:var(--brown-dk);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:30px; color:var(--cream);
  margin:0 auto 12px;
}
.login-logo h1 {
  font-family:'Playfair Display',serif;
  font-size:1.7rem;
  color:var(--brown-dk);
  letter-spacing:.02em;
}
.login-logo p {
  color:var(--muted);
  font-size:.74rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  margin-top:6px;
}
.login-card {
  background:var(--white);
  border-radius:6px;
  padding:30px 24px;
  width:100%;
  max-width:400px;
  box-shadow:0 4px 24px rgba(59,35,20,.10);
  border-top:3px solid var(--accent);
}
.lf { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.lf label {
  font-size:.78rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--brown);
}
.lf input, .lf select {
  padding:13px 14px;
  border:1px solid var(--tan);
  border-radius:4px;
  font-family:'Nunito',sans-serif;
  font-size:1rem;        /* 16px+ prevents iOS auto-zoom on focus */
  background:var(--cream);
  color:var(--brown-dk);
  transition:border-color .2s;
}
.lf input:focus, .lf select:focus { outline:none; border-color:var(--accent); }
.login-btn {
  width:100%;
  padding:14px;
  background:var(--accent);
  color:#fff; border:none; border-radius:4px;
  font-family:'Nunito',sans-serif;
  font-size:.95rem; font-weight:700; letter-spacing:.02em;
  cursor:pointer; transition:background .2s; margin-top:6px;
  min-height:48px;       /* iOS tap target */
}
.login-btn:hover { background:var(--accent-dk); }
.login-btn:disabled { opacity:.6; cursor:not-allowed; }
.login-error { color:var(--danger); font-size:.85rem; text-align:center; margin-top:12px; }
.login-error:empty { display:none; }
.login-hint { color:var(--muted); font-size:.78rem; text-align:center; margin-top:14px; }
.login-link {
  background:none; border:none; color:var(--accent);
  font-size:.78rem; cursor:pointer; text-decoration:underline;
  font-family:'Nunito',sans-serif; padding:6px 8px;
}

/* ============================================================
   APP SHELL
   ============================================================ */
#app { display:none; flex-direction:column; min-height:100vh; }
header {
  background:var(--white);
  color:var(--brown-dk);
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2px solid var(--accent);
  gap:10px;
}
.hdr-text h1 {
  font-family:'Playfair Display',serif;
  font-size:1.15rem;
  color:var(--brown-dk);
  letter-spacing:.01em;
  line-height:1.15;
}
.hdr-text p {
  font-size:.66rem;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:2px;
}
.hdr-right { display:flex; align-items:center; gap:8px; }
.hdr-user { font-size:.74rem; color:var(--muted); text-align:right; line-height:1.2; }
.hdr-user strong { display:block; color:var(--brown-dk); font-weight:700; font-size:.82rem; }
.btn-logout {
  background:transparent;
  border:1px solid var(--tan);
  color:var(--brown);
  padding:8px 12px;
  border-radius:4px;
  cursor:pointer;
  font-family:'Nunito',sans-serif;
  font-size:.78rem;
  min-height:36px;
}
.btn-logout:hover { background:var(--cream-dk); color:var(--brown-dk); }

nav {
  background:var(--white);
  border-bottom:1px solid var(--tan);
  display:flex;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  position:sticky;
  top:30px;             /* sits under the portal banner */
  z-index:50;
}
nav button {
  background:none; border:none;
  color:var(--brown);
  font-family:'Nunito',sans-serif;
  font-size:.86rem; font-weight:400;
  padding:14px 16px;
  cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .15s;
  white-space:nowrap;
  min-height:48px;
}
nav button:hover { color:var(--brown-dk); }
nav button.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:700; }

main { padding:18px 14px 60px; max-width:1100px; margin:0 auto; flex:1; width:100%; }
.section { display:none; }
.section.active { display:block; }

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
.page-h {
  font-family:'Playfair Display',serif;
  font-size:1.5rem; font-weight:700;
  color:var(--brown-dk); margin-bottom:2px;
}
.page-sub {
  color:var(--muted);
  font-size:.74rem; font-weight:700;
  text-transform:uppercase; letter-spacing:.12em;
  margin-bottom:18px;
}

/* ============================================================
   PANELS
   ============================================================ */
.panel {
  background:var(--white);
  border:1px solid var(--tan);
  border-radius:4px;
  padding:18px;
  margin-bottom:18px;
}
.panel-title {
  font-family:'Playfair Display',serif;
  font-size:1.05rem; font-weight:600;
  color:var(--brown-dk);
  margin-bottom:12px; padding-bottom:9px;
  border-bottom:1px solid var(--tan);
}
.panel-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }

.stats-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:18px;
}
.stat-card {
  background:var(--white);
  border:1px solid var(--tan);
  border-radius:4px;
  padding:14px;
  border-top:3px solid var(--accent);
}
.stat-card .sl {
  font-size:.7rem; text-transform:uppercase;
  letter-spacing:.1em; color:var(--muted);
}
.stat-card .sv {
  font-family:'Playfair Display',serif;
  font-size:1.6rem; font-weight:700;
  color:var(--brown-dk); margin-top:4px;
  word-break:break-word;
}
.stat-card .sh {
  font-size:.72rem; color:var(--muted); margin-top:2px;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display:inline-flex; align-items:center; justify-content:center;
  gap:6px;
  padding:11px 16px;
  border:none; border-radius:4px;
  font-family:'Nunito',sans-serif;
  font-size:.88rem; font-weight:600; letter-spacing:.01em;
  cursor:pointer; transition:all .15s;
  min-height:44px;
  text-decoration:none;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-dk); }
.btn-gold { background:var(--gold); color:var(--white); }
.btn-gold:hover { background:var(--brown); }
.btn-outline { background:transparent; border:1px solid var(--tan); color:var(--brown); }
.btn-outline:hover { background:var(--cream-dk); }
.btn-danger { background:var(--danger); color:white; }
.btn-danger:hover { background:var(--danger-dk); }
.btn-sm { padding:6px 12px; font-size:.78rem; min-height:32px; }
.btn-block { width:100%; }
.btn[disabled] { opacity:.55; cursor:not-allowed; }

/* ============================================================
   FORMS
   ============================================================ */
.form-row {
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-bottom:12px;
}
.fg { display:flex; flex-direction:column; gap:4px; }
.fg label {
  font-size:.76rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.08em; color:var(--brown);
}
.fg input, .fg select, .fg textarea {
  padding:11px 12px;
  border:1px solid var(--tan);
  border-radius:4px;
  font-family:'Nunito',sans-serif;
  font-size:1rem;        /* 16px+ prevents iOS auto-zoom */
  background:var(--cream);
  color:var(--brown-dk);
  transition:border-color .2s, background .2s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  outline:none; border-color:var(--accent); background:var(--white);
}
.fg textarea { resize:vertical; min-height:80px; font-family:'Nunito',sans-serif; }
.fg input[readonly] { background:var(--cream-dk); color:var(--muted); cursor:not-allowed; }
.fg .help { font-size:.74rem; color:var(--muted); margin-top:2px; }
.form-actions { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }

/* ============================================================
   TABLES
   ============================================================ */
.tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
table { width:100%; border-collapse:collapse; font-size:.86rem; }
thead { background:var(--brown-dk); color:var(--cream); }
thead th {
  padding:10px 12px; text-align:left;
  font-size:.72rem; letter-spacing:.08em; text-transform:uppercase;
  white-space:nowrap;
}
tbody tr { border-bottom:1px solid var(--tan); }
tbody tr:hover { background:var(--cream-dk); }
tbody td { padding:10px 12px; color:var(--brown-dk); vertical-align:top; }
.empty-row { text-align:center; color:var(--muted); font-style:italic; padding:22px !important; }

/* Card-list alternative to tables on mobile */
.card-list { display:flex; flex-direction:column; gap:10px; }
.card {
  background:var(--white);
  border:1px solid var(--tan);
  border-radius:4px;
  padding:14px;
  border-left:3px solid var(--accent);
}
.card-hd { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
.card-hd h3 { font-family:'Playfair Display',serif; font-size:1.02rem; color:var(--brown-dk); line-height:1.2; }
.card-sub { font-size:.78rem; color:var(--muted); margin-top:2px; }
.card-body { font-size:.88rem; color:var(--brown-dk); }
.card-meta { display:flex; gap:14px; flex-wrap:wrap; font-size:.78rem; color:var(--muted); margin-top:8px; }
.card-meta strong { color:var(--brown-dk); }
.card-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.card-actions .btn { flex:1; min-width:120px; }

/* ============================================================
   BADGES
   ============================================================ */
.badge {
  display:inline-block; padding:3px 9px; border-radius:3px;
  font-size:.72rem; font-weight:600; letter-spacing:.02em;
  white-space:nowrap;
}
.b-active     { background:#d4edda; color:#155724; }
.b-pending    { background:#fff3cd; color:#856404; }
.b-approved   { background:#d4edda; color:#155724; }
.b-paid       { background:#cce5ff; color:#004085; }
.b-released   { background:var(--tan); color:var(--brown); }
.b-cancelled  { background:#f8d7da; color:#721c24; }
.b-completed  { background:#d1ecf1; color:#0c5460; }
.b-inactive   { background:var(--tan); color:var(--brown); }
.b-warn       { background:#fff3cd; color:#856404; }
.b-danger     { background:#f8d7da; color:#721c24; }

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.55);
  z-index:1000;
  align-items:flex-end;        /* slide-up sheet on mobile */
  justify-content:center;
  padding:0;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--white);
  border-radius:8px 8px 0 0;
  padding:20px 18px 24px;
  width:100%;
  max-width:640px;
  max-height:94vh;
  overflow-y:auto;
  box-shadow:0 -4px 24px rgba(20,20,19,.18);
}
.modal-title {
  font-family:'Playfair Display',serif;
  font-size:1.15rem;
  margin-bottom:14px;
  color:var(--brown-dk);
}
.modal-actions {
  display:flex; gap:10px;
  margin-top:18px;
  flex-direction:column;
}
.modal-actions .btn { width:100%; }

/* ============================================================
   TOAST
   ============================================================ */
#toast {
  position:fixed; bottom:20px; left:50%; transform:translate(-50%, 80px);
  background:var(--brown-dk);
  color:var(--cream);
  padding:12px 20px;
  border-radius:6px;
  font-size:.9rem;
  box-shadow:0 4px 16px rgba(20,20,19,.20);
  opacity:0; transition:all .25s;
  z-index:9999;
  border-left:3px solid var(--accent);
  max-width:90%;
  text-align:center;
}
#toast.show { transform:translate(-50%, 0); opacity:1; }
#toast.error { border-left-color:var(--danger); }

/* ============================================================
   NOTIFICATION BANNERS (info / warning / urgent)
   ============================================================ */
.notif-item {
  padding:10px 16px;
  display:flex; align-items:center; gap:10px;
  font-size:.86rem;
  border-bottom:1px solid rgba(0,0,0,.07);
}
.notif-info    { background:var(--info-bg);    color:#1a5276; border-left:4px solid var(--info); }
.notif-warning { background:var(--warn-bg);    color:#7d6608; border-left:4px solid var(--warn); }
.notif-urgent  { background:var(--urgent-bg);  color:#922b21; border-left:4px solid var(--urgent); }
.notif-success { background:var(--success-bg); color:#1e8449; border-left:4px solid var(--success); }
.notif-text { flex:1; }
.notif-dismiss { background:none; border:none; cursor:pointer; opacity:.5; font-size:1.1rem; padding:2px 8px; }
.notif-dismiss:hover { opacity:1; }

/* ============================================================
   AVAILABILITY CALENDAR
   ============================================================ */
.cal-wrap { background:var(--white); border:1px solid var(--tan); border-radius:4px; padding:14px; margin-bottom:18px; }
.cal-header {
  display:flex; align-items:center; justify-content:space-between;
  gap:8px; margin-bottom:10px;
}
.cal-month-label {
  font-family:'Playfair Display',serif;
  font-size:1.1rem; color:var(--brown-dk);
  flex:1; text-align:center;
}
.cal-nav-btn {
  background:var(--cream-dk); border:none; color:var(--brown-dk);
  font-size:1.1rem; width:36px; height:36px; border-radius:4px;
  cursor:pointer; font-weight:700;
}
.cal-nav-btn:hover { background:var(--tan); }
.cal-dow-row {
  display:grid; grid-template-columns:repeat(7,1fr); gap:2px;
  font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;
  text-align:center; padding-bottom:4px; font-weight:700;
}
.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr); gap:3px;
}
.cal-day {
  aspect-ratio:1;
  background:var(--cream-lt);
  border:1px solid var(--tan);
  border-radius:4px;
  display:flex; flex-direction:column;
  align-items:flex-start; justify-content:flex-start;
  padding:4px 5px;
  cursor:pointer;
  position:relative;
  transition:background .15s, border-color .15s;
  font-size:.76rem;
  color:var(--brown-dk);
  user-select:none;
  min-height:44px;
}
.cal-day:hover { border-color:var(--accent); }
.cal-day.cd-blank { background:transparent; border-color:transparent; cursor:default; }
.cal-day.cd-past  { opacity:.45; cursor:not-allowed; }
.cal-day.cd-today { border:2px solid var(--brown-dk); }
.cal-day.cd-free      { background:#dcefd5; border-color:var(--accent); }
.cal-day.cd-busy      { background:#fadbd8; border-color:var(--danger); color:var(--danger-dk); }
.cal-day.cd-tentative { background:#fff3cd; border-color:#d4ac0d; color:#7d6608; }
.cal-day.cd-selected  { outline:3px solid var(--brown-dk); outline-offset:-1px; }
.cal-day-num { font-weight:700; font-size:.86rem; }
.cal-day-meta {
  font-size:.62rem; color:inherit; margin-top:auto;
  align-self:stretch; text-align:right; opacity:.85;
}
.cal-day .pip {
  width:6px; height:6px; border-radius:50%;
  background:var(--accent); position:absolute; top:4px; right:4px;
}
.cal-legend {
  display:flex; gap:14px; flex-wrap:wrap;
  font-size:.76rem; color:var(--muted);
  margin-top:10px; padding-top:10px;
  border-top:1px solid var(--tan);
}
.cal-legend-swatch {
  display:inline-block; width:14px; height:14px;
  border:1px solid var(--tan); border-radius:3px;
  vertical-align:middle; margin-right:4px;
}
.cal-toolbar {
  display:flex; gap:8px; flex-wrap:wrap;
  margin-top:12px;
}
.cal-toolbar .btn { flex:1; min-width:120px; }

/* Admin heatmap variant */
.cal-day.cd-heat .cd-counts {
  font-size:.6rem; color:var(--brown-dk);
  align-self:stretch; text-align:right; opacity:.9;
  font-weight:700;
}
.cal-day.cd-heat .free-c { color:var(--accent-dk); }
.cal-day.cd-heat .busy-c { color:var(--danger-dk); }

/* ============================================================
   DOCUMENT UPLOADS
   ============================================================ */
.doc-list { display:flex; flex-direction:column; gap:8px; }
.doc-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--cream); border:1px solid var(--tan); border-radius:4px;
}
.doc-item .doc-icon { font-size:1.3rem; }
.doc-item .doc-meta { flex:1; min-width:0; }
.doc-item .doc-name { font-weight:700; font-size:.88rem; color:var(--brown-dk); word-break:break-word; }
.doc-item .doc-sub { font-size:.72rem; color:var(--muted); }
.doc-item .doc-actions { display:flex; gap:4px; }
.doc-upload-zone {
  border:2px dashed var(--tan-dk);
  border-radius:4px;
  padding:18px;
  text-align:center;
  background:var(--cream);
  cursor:pointer;
}
.doc-upload-zone:hover { border-color:var(--accent); background:var(--cream-dk); }

/* ============================================================
   AUDIT LOG
   ============================================================ */
.audit-item {
  padding:10px 12px;
  border-bottom:1px solid var(--tan);

<script>

const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlsdm9zd3pzaWppZ3llenF2YWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2Mjk5MTAsImV4cCI6MjA4OTIwNTkxMH0.iA4QMZkxTsqArV3CgHb-YluiBeiIq5RppGV6kBe8G8g';

// When the second EmailJS account is created (see docs/EMAILJS.md),

const EMAILJS_ENABLED = false;
const EMAILJS_PUBLIC_KEY = 'PLACEHOLDER_PUBLIC_KEY';
const EMAILJS_SERVICE_ID = 'PLACEHOLDER_SERVICE_ID';
const EMAILJS_TEMPLATES = {
  shift_new:         'PLACEHOLDER_TEMPLATE_shift_new',

  shift_reminder:    'PLACEHOLDER_TEMPLATE_shift_reminder',
  shift_cancelled:   'PLACEHOLDER_TEMPLATE_shift_cancelled',

};

// Activate EmailJS only if enabled
if (EMAILJS_ENABLED && window.emailjs) {

/* ============================================================
   GLOBAL STATE
   ============================================================ */
let session = null;       // { user, contractor, role: 'admin'|'contractor' }
let _inactivityTimer = null;
const INACTIVITY_TIMEOUT_MS = 60 * 60 * 1000;  // 60 minutes
const STORAGE_KEYS = {
  dismissedNotifs: 'lfb_c_dismissed_notifs'
};

/* ============================================================
   NOTIFY — single email/notification entry point (stub until
   EmailJS is wired in).
   ============================================================ */
function notify(eventType, payload) {
  // Standardised event types match EMAILJS_TEMPLATES keys.
  if (!EMAILJS_ENABLED) {
    console.log('[notify:stub]', eventType, payload);
    return Promise.resolve({ stubbed: true });
  }
  const tplId = EMAILJS_TEMPLATES[eventType];
  if (!tplId) return Promise.reject(new Error('Unknown event type: '+eventType));
  // payload is expected to include to_email + template variables
  return emailjs.send(EMAILJS_SERVICE_ID, tplId, payload)
    .catch(err => { console.warn('[notify] send failed', eventType, err); return null; });
}

// Helper to broadcast (sequentially, with a small delay to be nice
// to free-tier email rate limits).
async function notifyMany(eventType, recipients, paramsFn) {
  for (const r of recipients) {
    const params = paramsFn(r);
    await notify(eventType, params);
    await sleep(450);
  }
}

/* ============================================================
   HELPERS
   ============================================================ */
function $(id){ return document.getElementById(id); }
function v(id){ const el=$(id); return el ? el.value.trim() : ''; }
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtCur(n){ return '$'+(Number(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function fmtDate(d){
  if (!d) return '—';
  const [y,m,day] = String(d).split('T')[0].split('-');
  return new Date(+y,+m-1,+day).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateShort(d){
  if (!d) return '—';
  const [y,m,day] = String(d).split('T')[0].split('-');
  return new Date(+y,+m-1,+day).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function fmtDay(d){
  if (!d) return '';
  const [y,m,day] = String(d).split('T')[0].split('-');
  return new Date(+y,+m-1,+day).toLocaleDateString('en-US',{weekday:'long'});
}
function fmtTime(t){
  if (!t) return '—';
  const [h,m] = String(t).split(':');
  const d = new Date();
  d.setHours(+h, +m||0, 0, 0);
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function isoFromDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function daysFromToday(iso){
  const a=new Date(todayISO()+'T12:00:00');
  const b=new Date(iso+'T12:00:00');
  return Math.round((b-a)/(1000*60*60*24));
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function toast(msg, opts={}){
  const t = $('toast');
  t.textContent = msg;
  t.className = opts.error ? 'show error' : 'show';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.className='', 2800);
}

function openModal(title, bodyHtml, actions){
  $('generic-modal-title').textContent = title;
  $('generic-modal-body').innerHTML = bodyHtml;
  const ab = $('generic-modal-actions');
  ab.innerHTML = '';
  (actions||[]).forEach(a => {
    const b = document.createElement('button');
    b.className = 'btn '+(a.cls||'btn-outline');
    b.textContent = a.label;
    b.onclick = a.onClick || (()=>closeModal());
    if (a.disabled) b.disabled = true;
    ab.appendChild(b);
  });
  $('generic-modal').classList.add('open');
}
function closeModal(){ $('generic-modal').classList.remove('open'); }

function resetInactivityTimer(){
  clearTimeout(_inactivityTimer);
  _inactivityTimer = setTimeout(()=>{
    toast('Signed out — inactivity timeout', {error:true});
    signOut();
  }, INACTIVITY_TIMEOUT_MS);
}
['click','keydown','touchstart'].forEach(ev =>
  document.addEventListener(ev, ()=>{ if (session) resetInactivityTimer(); }, {passive:true})
);

/* ============================================================
   AUTH
   ============================================================ */
const ADMIN_LOGIN_EMAIL = 'info@lazarfamilybakehouse.com';

function toggleAdminLogin() {
  const mode = document.body.dataset.loginMode === 'admin' ? 'contractor' : 'admin';
  document.body.dataset.loginMode = mode;
  const emailField = $('login-email-field');
  const pwLabel    = $('login-password-label');
  const pwInput    = $('login-password');
  const subtitle   = $('login-mode-subtitle');
  const firstTime  = $('login-first-time');
  const hintArea   = $('login-hint-area');
  const adminBtn   = $('admin-toggle-btn');
  if (mode === 'admin') {
    emailField.style.display = 'none';
    pwLabel.textContent = 'Admin PIN';
    pwInput.placeholder = 'Admin PIN';
    subtitle.textContent = 'Admin Login';
    firstTime.style.display = 'none';
    hintArea.innerHTML = '<button class="login-link" onclick="toggleAdminLogin()">&larr; Back to contractor login</button>';
    adminBtn.style.opacity = '.85';
    pwInput.focus();
  } else {
    emailField.style.display = '';
    pwLabel.textContent = 'PIN';
    pwInput.placeholder = '6-digit PIN from admin';
    subtitle.textContent = 'Contractor Portal';
    firstTime.style.display = '';
    hintArea.innerHTML = '<span style="color:var(--muted);">Forgot your PIN? Ask admin to reset it.</span>';
    adminBtn.style.opacity = '.45';
  }
  $('login-error').textContent = '';
}

async function signIn() {
  const btn = $('login-submit');
  const err = $('login-error');
  err.textContent = '';
  const isAdmin = document.body.dataset.loginMode === 'admin';
  const email = isAdmin ? ADMIN_LOGIN_EMAIL : v('login-email').toLowerCase();
  const password = v('login-password');
  if (!email || !password) {
    err.textContent = isAdmin ? 'Enter the admin PIN.' : 'Email and PIN are required.';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw new Error(isAdmin ? 'Incorrect admin PIN.' : 'Email or PIN is wrong. Check with admin.');

    const { data: me, error: meErr } = await sb.rpc('c_me');
    if (meErr) throw meErr;
    if (!me || !me.id) throw new Error('No profile linked to this account. Contact admin.');
    if (me.status !== 'active') throw new Error('Your account is not active. Contact admin.');

    session = { user: data.user, contractor: me, role: me.role };
    await bootApp();
    resetInactivityTimer();
  } catch (e) {
    console.warn('Sign in error', e);
    err.textContent = e.message || 'Sign in failed. Try again.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function signOut() {
  clearTimeout(_inactivityTimer);
  try { await sb.auth.signOut(); } catch (e) { /* swallow */ }
  sb.removeAllChannels();
  session = null;
  $('app').style.display = 'none';
  $('login-screen').style.display = 'flex';
  $('login-password').value = '';
  $('login-error').textContent = '';
  if (document.body.dataset.loginMode === 'admin') toggleAdminLogin();
}

async function sendResetEmail() {
  const email = v('login-email').toLowerCase();
  if (!email) { toast('Enter your email above first', {error:true}); return; }
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: PORTAL_URL
    });
    if (error) throw error;
    toast('Check your email for a reset link');
  } catch (e) {
    toast(e.message || 'Could not send reset email', {error:true});
  }
}

// Restore session on page load (if user is already signed in)
async function tryRestoreSession() {
  const { data } = await sb.auth.getSession();
  if (!data.session) return;
  try {
    const { data: me, error: meErr } = await sb.rpc('c_me');
    if (meErr || !me || !me.id) return;
    if (me.status !== 'active') return;
    session = { user: data.session.user, contractor: me, role: me.role };
    await bootApp();
    resetInactivityTimer();
  } catch (e) {
    console.warn('Restore session failed', e);
  }
}

/* ============================================================
   BOOT
   ============================================================ */
async function bootApp() {
  $('login-screen').style.display = 'none';
  $('app').style.display = 'flex';
  const c = session.contractor;
  $('hdr-user-name').textContent = `${c.first_name||''} ${c.last_name||''}`.trim() || c.email;
  $('hdr-user-role').textContent = session.role === 'admin' ? 'Admin' : 'Contractor';
  $('hdr-subtitle').textContent = session.role === 'admin' ? 'Admin Dashboard' : 'Contractor Portal';
  buildNav();
  buildContent();
  const firstSection = session.role === 'admin' ? 'a-dashboard' : 'c-home';
  showSection(firstSection);
  setupRealtime();
  renderNotifBanner();
}

/* ============================================================
   NAV
   ============================================================ */
const ADMIN_SECTIONS = [
  { id:'a-dashboard',    label:'Dashboard',    icon:'📊' },
  { id:'a-shifts',       label:'Shifts',       icon:'🍞' },
  { id:'a-availability', label:'Availability', icon:'📅' },
  { id:'a-approvals',    label:'Approvals',    icon:'✅' },
  { id:'a-payments',     label:'Payments',     icon:'💵' },
  { id:'a-contractors',  label:'Contractors',  icon:'👥' },
  { id:'a-settings',     label:'Settings',     icon:'⚙️' }
  // Audit log hidden from nav (triggers still capture data; restore by adding {id:'a-audit', label:'Audit', icon:'📜'} back to this array)
];
const CONTRACTOR_SECTIONS = [
  { id:'c-home',         label:'Home',         icon:'🏠' },
  { id:'c-schedule',     label:'Schedule',     icon:'📅' },
  { id:'c-myshifts',     label:'My Shifts',    icon:'📋' },
  { id:'c-availability', label:'Availability', icon:'🗓️' },
  { id:'c-payments',     label:'Payments',     icon:'💵' },
  { id:'c-profile',      label:'Profile',      icon:'👤' }
];

function currentSections(){ return session.role === 'admin' ? ADMIN_SECTIONS : CONTRACTOR_SECTIONS; }

function buildNav() {
  const nav = $('main-nav');
  nav.innerHTML = currentSections().map(s =>
    `<button data-section="${s.id}" onclick="showSection('${s.id}')">${s.icon} ${s.label}</button>`
  ).join('');
}

function buildContent() {
  const main = $('main-content');
  main.innerHTML = currentSections().map(s => `<section class="section" id="sec-${s.id}"></section>`).join('');
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const sec = $('sec-'+id);
  if (sec) sec.classList.add('active');
  const navBtn = document.querySelector(`nav button[data-section="${id}"]`);
  if (navBtn) {
    navBtn.classList.add('active');
    // Scroll active nav button into view on mobile
    navBtn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }
  // Lazy-render the section the first time it's shown
  const renderer = SECTION_RENDERERS[id];
  if (renderer) renderer();
  window.scrollTo({ top:0, behavior:'instant' });
}

// Each section registers its renderer here. Renderers are added
// in the section-specific blocks below (admin and contractor).
const SECTION_RENDERERS = {};

/* ============================================================
   REALTIME
   ============================================================ */
function setupRealtime() {
  // Subscribe to changes that may affect the current view. Cheap
  // and effective: any change to shifts, signups, hours, or payments
  // triggers a refresh of the currently visible section.
  const ch = sb.channel('c-realtime-'+Math.random().toString(36).slice(2,8))
    .on('postgres_changes', { event:'*', schema:'public', table:'c_shifts' }, refreshActiveSection)
    .on('postgres_changes', { event:'*', schema:'public', table:'c_shift_signups' }, refreshActiveSection)
    .on('postgres_changes', { event:'*', schema:'public', table:'c_hour_submissions' }, refreshActiveSection)
    .on('postgres_changes', { event:'*', schema:'public', table:'c_payments' }, refreshActiveSection)
    .on('postgres_changes', { event:'*', schema:'public', table:'c_availability' }, refreshActiveSection)
    .subscribe();
}
function refreshActiveSection() {
  const active = document.querySelector('.section.active');
  if (!active) return;
  const id = active.id.replace(/^sec-/,'');
  const r = SECTION_RENDERERS[id];
  if (r) r();
}

/* ============================================================
   NOTIFICATION BANNER
   In-portal banners (above the nav) for time-sensitive items
   like document expirations, stale availability, etc.
   ============================================================ */
function getDismissed() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.dismissedNotifs)||'[]'); }
  catch { return []; }
}
function dismissNotif(key) {
  const dismissed = getDismissed();
  if (!dismissed.includes(key)) dismissed.push(key);
  localStorage.setItem(STORAGE_KEYS.dismissedNotifs, JSON.stringify(dismissed));
  renderNotifBanner();
}

async function renderNotifBanner() {
  const items = [];
  const c = session.contractor;
  const dismissed = getDismissed();

  // Food-handler-card expiration warning (contractor self)
  if (c.food_handler_card_expires) {
    const days = daysFromToday(c.food_handler_card_expires);
    if (days < 0)        items.push({ key:'food-exp', type:'urgent',  text:`Your food handler card expired ${Math.abs(days)} day${Math.abs(days)===1?'':'s'} ago. Please renew.` });
    else if (days <= 30) items.push({ key:'food-exp', type:'warning', text:`Your food handler card expires in ${days} day${days===1?'':'s'}.` });
  }

  // Stale availability (contractor)
  if (session.role === 'contractor') {
    const last = c.availability_last_updated_at;
    const stale = !last || (Date.now() - new Date(last).getTime() > 30*24*60*60*1000);
    if (stale) items.push({ key:'avail-stale', type:'info', text:`Your availability looks out of date. Update it so we can plan shifts around you.` });
  }

  const html = items
    .filter(i => !dismissed.includes(i.key))
    .map(i => `
      <div class="notif-item notif-${i.type}">
        <span class="notif-text">${esc(i.text)}</span>
        <button class="notif-dismiss" onclick="dismissNotif('${i.key}')">×</button>
      </div>
    `).join('');
  $('notif-banner').innerHTML = html;
}

/* ============================================================
   SECTION RENDERERS — populated in the next blocks
   Each renderer fetches the data it needs and writes HTML into
   its #sec-<id> container. They are called every time the
   section is shown OR when realtime fires a refresh.
   ============================================================ */

/* --- ADMIN sections --- */
SECTION_RENDERERS['a-dashboard']    = renderAdminDashboard;
SECTION_RENDERERS['a-shifts']       = renderAdminShifts;
SECTION_RENDERERS['a-availability'] = renderAdminAvailability;
SECTION_RENDERERS['a-approvals']    = renderAdminApprovals;
SECTION_RENDERERS['a-payments']     = renderAdminPayments;
SECTION_RENDERERS['a-contractors']  = renderAdminContractors;
SECTION_RENDERERS['a-audit']        = renderAdminAudit;
SECTION_RENDERERS['a-settings']     = renderAdminSettings;

/* --- CONTRACTOR sections --- */
SECTION_RENDERERS['c-home']         = renderContractorHome;
SECTION_RENDERERS['c-schedule']     = renderContractorSchedule;
SECTION_RENDERERS['c-myshifts']     = renderContractorMyShifts;
SECTION_RENDERERS['c-availability'] = renderContractorAvailability;
SECTION_RENDERERS['c-payments']     = renderContractorPayments;
SECTION_RENDERERS['c-profile']      = renderContractorProfile;

/* ============================================================
   PLACEHOLDER RENDERERS
   These are replaced in subsequent script blocks below. Stubs
   here so an early reload won't error out.
   ============================================================ */
function _stub(name) { return async () => { /* implemented below */ }; }
function renderAdminDashboard()    { /* IMPL_BELOW_a_dashboard */ }
function renderAdminShifts()       { /* IMPL_BELOW_a_shifts */ }
function renderAdminAvailability() { /* IMPL_BELOW_a_availability */ }
function renderAdminApprovals()    { /* IMPL_BELOW_a_approvals */ }
function renderAdminPayments()     { /* IMPL_BELOW_a_payments */ }
function renderAdminContractors()  { /* IMPL_BELOW_a_contractors */ }

async function loadSettings() {
  const { data, error } = await sb.from('c_settings').select('*');
  if (error) { console.warn(error); return {}; }
  const map = {};
  (data||[]).forEach(r => map[r.key] = r.value);
  return map;
}

async function loadShiftsWithCounts({ from, to, statuses } = {}) {
  let q = sb.from('c_shifts').select('*').order('bake_date', { ascending: true }).order('start_time', { ascending: true });
  if (from) q = q.gte('bake_date', from);
  if (to)   q = q.lte('bake_date', to);
  if (statuses) q = q.in('status', statuses);
  const { data: shifts, error } = await q;
  if (error) { toast(error.message,{error:true}); return []; }
  if (!shifts?.length) return [];
  const ids = shifts.map(s=>s.id);
  const { data: signups, error: sErr } = await sb.from('c_shift_signups')
    .select('id, shift_id, contractor_id, status, signed_up_at, released_at')
    .in('shift_id', ids);
  if (sErr) { console.warn(sErr); }
  const byShift = {};
  (signups||[]).forEach(su => {
    (byShift[su.shift_id] ||= []).push(su);
  });
  shifts.forEach(s => {
    const arr = byShift[s.id] || [];
    s.signups        = arr;
    s.active_signups = arr.filter(x => x.status === 'signed_up');
    s.spots_filled   = s.active_signups.length;
    s.spots_left     = Math.max(0, s.spots_total - s.spots_filled);
    s.i_signed_up    = arr.some(x => x.contractor_id === session.contractor.id && x.status === 'signed_up');
    s.my_signup      = arr.find(x => x.contractor_id === session.contractor.id);
  });
  return shifts;
}

async function loadUnpaidApprovedHours(contractorId) {
  // Approved hour rows for this contractor that don't yet have a payment_item
  const { data: subs, error } = await sb.from('c_hour_submissions')
    .select('*, shift:c_shifts(*)')
    .eq('contractor_id', contractorId)
    .eq('status', 'approved')
    .order('approved_at', { ascending: true });
  if (error) { toast(error.message,{error:true}); return []; }
  if (!subs?.length) return [];
  const ids = subs.map(s=>s.id);
  const { data: paid } = await sb.from('c_payment_items')
    .select('hour_submission_id')
    .in('hour_submission_id', ids);
  const paidIds = new Set((paid||[]).map(p=>p.hour_submission_id));
  return subs.filter(s => !paidIds.has(s.id));
}

async function adminCreateContractor({ email, first_name, last_name, phone, pay_rate, role, pin }) {
  if (!email || !first_name) throw new Error('Email and first name required');
  const { data, error } = await sb.from('c_contractors').insert({
    email: email.toLowerCase().trim(),
    first_name, last_name: last_name||'', phone: phone||'',
    pay_rate: Number(pay_rate)||0,
    role: role==='admin' ? 'admin' : 'contractor',
    status: 'active',
    pin: pin || null
  }).select().single();
  if (error) throw error;
  return data;
}

async function adminSendInvite(email) {
  if (!email) throw new Error('Email required');
  const { data: can, error: canErr } = await sb.rpc('c_can_invite', { p_email: email });
  if (canErr) throw canErr;
  if (!can) throw new Error('No active contractor found with that email');
  const { error } = await sb.auth.signInWithOtp({
    email: email.toLowerCase().trim(),
    options: { shouldCreateUser: true, emailRedirectTo: PORTAL_URL }
  });
  if (error) throw error;
}

  if (error) throw error;
}

async function adminCreateShift(shift) {
  const status = ['open','tentative','cancelled','completed'].includes(shift.status) ? shift.status : 'open';
  const payload = {
    bake_date:   shift.bake_date,
    start_time:  shift.start_time,
    end_time:    shift.end_time || null,
    location:    shift.location,
    spots_total: Number(shift.spots_total) || 1,
    notes:       shift.notes || '',
    created_by:  session.contractor.id,
    status:      status,
    start_times: shift.start_times || null
  };
  const { data, error } = await sb.from('c_shifts').insert(payload).select().single();
  if (error) throw error;
  if (status !== 'open') return data;
  const contractors = await loadAllContractors({ activeOnly:true });
  const others = contractors.filter(c => c.role !== 'admin');
  await notifyMany('shift_new', others, c => ({
    to_email:   c.email,
    first_name: c.first_name,
    bake_date:  fmtDate(data.bake_date),
    start_time: fmtTime(data.start_time),
    location:   data.location,
    spots_total:String(data.spots_total),
    shift_notes:data.notes || '(none)',
    portal_url: PORTAL_URL
  }));
  return data;
}

async function adminUpdateShift(id, updates) {

}

async function adminCancelShift(id, reason) {
  // Look up signups so we can notify
  const { data: shift } = await sb.from('c_shifts').select('*').eq('id', id).single();
  const { data: signups } = await sb.from('c_shift_signups')
    .select('contractor:c_contractors(email, first_name)')
    .eq('shift_id', id).eq('status', 'signed_up');
  const { error } = await sb.from('c_shifts').update({
    status: 'cancelled',
    cancelled_reason: reason || '',
    cancelled_at: new Date().toISOString()
  }).eq('id', id);
  if (error) throw error;
  await notifyMany('shift_cancelled', (signups||[]).map(s=>s.contractor), c => ({
    to_email:           c.email,
    first_name:         c.first_name,
    bake_date:          fmtDate(shift.bake_date),
    location:           shift.location,
    cancel_reason_line: reason ? `Reason: ${reason}` : '',
    portal_url:         PORTAL_URL
  }));
}

async function contractorReleaseSignup(signupId) {
  // Find the shift for the email
  const { data: signup } = await sb.from('c_shift_signups')
    .select('*, shift:c_shifts(*)').eq('id', signupId).single();
  const { error } = await sb.rpc('c_release_signup', { p_signup_id: signupId });
  if (error) throw error;
  if (signup?.shift) {
    // notify other active contractors
    const contractors = await loadAllContractors({ activeOnly:true });
    const others = contractors.filter(c => c.id !== session.contractor.id && c.role !== 'admin');
    await notifyMany('shift_released', others, c => ({
      to_email:   c.email,
      first_name: c.first_name,
      bake_date:  fmtDate(signup.shift.bake_date),
      start_time: fmtTime(signup.shift.start_time),
      location:   signup.shift.location,
      portal_url: PORTAL_URL
    }));
  }
}

async function adminApproveHours(submissionId, approvedHours, adminNotes) {
  const { error } = await sb.rpc('c_approve_hours', {
    p_submission_id:  submissionId,
    p_approved_hours: Number(approvedHours),
    p_admin_notes:    adminNotes || ''
  });
  if (error) throw error;
  // load the submission + contractor to send the email
  const { data: sub } = await sb.from('c_hour_submissions')
    .select('*, shift:c_shifts(*), contractor:c_contractors(*)')
    .eq('id', submissionId).single();
  if (sub) {
    // compute YTD line for the email
    const ytd = await loadYTDSummary();
    const myRow = (ytd||[]).find(r => r.contractor_id === sub.contractor_id) || {};
    await notify('hours_approved', {
      to_email:         sub.contractor.email,
      first_name:       sub.contractor.first_name,
      bake_date:        fmtDate(sub.shift.bake_date),
      approved_hours:   String(sub.approved_hours),
      pay_rate:         fmtCur(sub.approved_pay_rate),
      approved_amount:  fmtCur(sub.approved_amount),
      admin_notes_line: sub.admin_notes ? `Note from admin: ${sub.admin_notes}` : '',
      ytd_hours:        String(myRow.approved_hours||0),
      ytd_paid:         fmtCur(myRow.paid_amount||0),
      ytd_pending:      fmtCur(myRow.unpaid_amount||0),
      portal_url:       PORTAL_URL
    });
  }
}

async function adminCreatePayment({ contractor_id, amount, method, paid_on, reference, notes, submissionIds }) {
  const { data: payment, error } = await sb.from('c_payments').insert({
    contractor_id, amount: Number(amount), method,
    paid_on, reference: reference||'', notes: notes||'',
    created_by: session.contractor.id
  }).select().single();
  if (error) throw error;
  if (submissionIds?.length) {
    // Look up amounts per submission for proper allocation
    const { data: subs } = await sb.from('c_hour_submissions')
      .select('id, approved_amount')
      .in('id', submissionIds);
    const items = (subs||[]).map(s => ({
      payment_id: payment.id,
      hour_submission_id: s.id,
      amount: s.approved_amount
    }));
    if (items.length) {
      const { error: iErr } = await sb.from('c_payment_items').insert(items);
      if (iErr) throw iErr;
    }
  }
  return payment;
}

async function contractorSetAvailability(dates, status, note) {
  if (status === null) {
    // Clear: delete rows for those dates
    const { error } = await sb.from('c_availability')
      .delete()
      .eq('contractor_id', session.contractor.id)
      .in('the_date', dates);
    if (error) throw error;
    return dates.length;
  }
  const { data, error } = await sb.rpc('c_set_availability_bulk', {
    p_dates: dates, p_status: status, p_note: note || ''
  });
  if (error) throw error;
  return data;
}

async function uploadDocument({ file, document_type, expires_on }) {
  if (!file) throw new Error('No file selected');
  if (file.size > 10 * 1024 * 1024) throw new Error('File too large (10 MB max)');
  const safeName = file.name.replace(/[^\w.\-]/g,'_');
  const path = `${session.contractor.id}/${Date.now()}-${safeName}`;
  const { error: upErr } = await sb.storage.from('contractor-documents').upload(path, file, { upsert: false });
  if (upErr) throw upErr;
  const { error: insErr } = await sb.from('c_documents').insert({
    contractor_id: session.contractor.id,
    document_type, file_path: path, file_name: file.name,
    file_size_bytes: file.size, mime_type: file.type || null,
    expires_on: expires_on || null,
    uploaded_by: session.contractor.id
  });
  if (insErr) throw insErr;
}

async function deleteDocument(doc) {
  await sb.storage.from('contractor-documents').remove([doc.file_path]);
  const { error } = await sb.from('c_documents').delete().eq('id', doc.id);
  if (error) throw error;
}

async function downloadDocumentURL(filePath) {
  const { data, error } = await sb.storage.from('contractor-documents').createSignedUrl(filePath, 600);
  if (error) throw error;
  return data.signedUrl;
}

function monthInfo(year, month0) {
  const first = new Date(year, month0, 1);
  const days = new Date(year, month0+1, 0).getDate();
  const blanks = first.getDay();  // 0=Sun
  const cells = [];
  for (let i = 0; i < blanks; i++) cells.push({ blank: true });
  for (let d = 1; d <= days; d++) cells.push({ blank: false, iso: isoFromDate(new Date(year, month0, d)), day: d });
  while (cells.length % 7 !== 0) cells.push({ blank: true });
  return { cells, monthLabel: first.toLocaleDateString('en-US',{month:'long',year:'numeric'}) };
}

async function renderContractorHome() {
  const el = $('sec-c-home');
  el.innerHTML = '<div class="page-h">Welcome back</div><div class="page-sub">Loading…</div>';
  const [myShifts, ytd, openShifts] = await Promise.all([
    loadMyShifts(),
    loadYTDSummary(),
    loadShiftsWithCounts({ from: todayISO(), statuses: ['open'] })

  const upcoming = myShifts.filter(ms => ms.status === 'signed_up' && ms.shift && ms.shift.bake_date >= todayISO())

        <button class="btn btn-outline btn-sm" onclick="showSection('c-myshifts')">View all my shifts</button>

function shiftCardHtml(s, contractorView) {
  const urgent = (contractorView && s.spots_left > 0 && daysFromToday(s.bake_date) <= 2 && s.status === 'open');
  const fillBar = `${s.spots_filled}/${s.spots_total} signed up`;
  const isTentative = s.status === 'tentative';
  const startTimesDisplay = (s.start_times && s.start_times.length > 0)
    ? s.start_times.map(t => fmtTime(t)).join(' / ')
    : fmtTime(s.start_time) + (s.end_time ? '–' + fmtTime(s.end_time) : '');
  let action;
  if (contractorView) {
    if (isTentative) {
      action = `<button class="btn btn-outline btn-sm" disabled>Tentative — locked</button>`;
    } else if (s.i_signed_up) {
      action = `<button class="btn btn-outline btn-sm" disabled>Signed up</button>`;
    } else if (s.spots_left > 0) {
      const hasMultiStarts = s.start_times && s.start_times.length > 0;
      action = hasMultiStarts
        ? `<button class="btn btn-primary btn-sm" onclick="openSignupStartPicker('${s.id}')">Sign up</button>`
        : `<button class="btn btn-primary btn-sm" onclick="signUpForShift('${s.id}')">Sign up</button>`;
    } else {
      action = `<button class="btn btn-outline btn-sm" disabled>Full</button>`;
    }
  } else {

function renderAvailabilityGrid() {
  const info = monthInfo(_avState.year, _avState.month);
  $('av-month-label').textContent = info.monthLabel;
  const grid = $('av-grid');
  const today = todayISO();
  grid.innerHTML = info.cells.map(c => {
    if (c.blank) return '<div class="cal-day cd-blank"></div>';
    const row = _avState.data[c.iso];
    const cls = ['cal-day'];
    if (row?.status) cls.push('cd-'+row.status);
    if (c.iso < today) cls.push('cd-past');
    if (c.iso === today) cls.push('cd-today');
    if (_avState.selected.has(c.iso)) cls.push('cd-selected');
    return `
      <div class="${cls.join(' ')}" onclick="availDayTap('${c.iso}')">
        <div class="cal-day-num">${c.day}</div>
        ${row?.note ? `<div class="cal-day-meta">${esc(row.note.slice(0,8))}${row.note.length>8?'…':''}</div>` : ''}
      </div>
    `;
  }).join('');
  $('av-action-bar').style.display = _avState.selected.size > 0 ? '' : 'none';
}

window.availPrevMonth = function(){
  if (_avState.month === 0) { _avState.year -= 1; _avState.month = 11; }
  else _avState.month -= 1;
  _avState.selected.clear();
  renderContractorAvailability();
};
window.availNextMonth = function(){
  if (_avState.month === 11) { _avState.year += 1; _avState.month = 0; }
  else _avState.month += 1;
  _avState.selected.clear();
  renderContractorAvailability();
};
window.availDayTap = function(iso) {
  if (iso < todayISO()) { toast('Past dates are locked', {error:true}); return; }
  if (_avState.selected.size > 0) {
    if (_avState.selected.has(iso)) _avState.selected.delete(iso);
    else _avState.selected.add(iso);
    renderAvailabilityGrid();
    return;
  }
  // Single-tap cycle: free → busy → tentative → clear
  const cur = _avState.data[iso]?.status;
  const next = cur === undefined || cur === null ? 'free'
             : cur === 'free' ? 'busy'
             : cur === 'busy' ? 'tentative'
             : null;
  applyAvailability([iso], next);
};
window.availSelectAll = function(){
  const info = monthInfo(_avState.year, _avState.month);
  const today = todayISO();
  info.cells.forEach(c => { if (!c.blank && c.iso >= today) _avState.selected.add(c.iso); });
  renderAvailabilityGrid();
};
window.availSelectWeekends = function(){
  const info = monthInfo(_avState.year, _avState.month);
  const today = todayISO();
  info.cells.forEach(c => {
    if (c.blank || c.iso < today) return;
    const d = new Date(c.iso+'T12:00:00').getDay();
    if (d === 0 || d === 6) _avState.selected.add(c.iso);
  });
  renderAvailabilityGrid();
};
window.availClearSelection = function(){ _avState.selected.clear(); renderAvailabilityGrid(); };
window.availApplyStatus = async function(status){
  const dates = Array.from(_avState.selected);
  if (!dates.length) return;
  await applyAvailability(dates, status);
  _avState.selected.clear();
};
async function applyAvailability(dates, status) {
  try {
    await contractorSetAvailability(dates, status);
    if (status === null) dates.forEach(d => delete _avState.data[d]);
    else dates.forEach(d => _avState.data[d] = { the_date:d, status });
    toast(status === null ? 'Cleared' : `Marked ${status}`);
    renderAvailabilityGrid();
    session.contractor.availability_last_updated_at = new Date().toISOString();
  } catch (e) {
    toast(e.message || 'Update failed', {error:true});
  }
}
window.availPresetWeekendsFreeNext90 = async function() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today); d.setDate(today.getDate()+i);
    if (d.getDay() === 0 || d.getDay() === 6) dates.push(isoFromDate(d));
  }
  await applyAvailability(dates, 'free');
  renderContractorAvailability();
};
window.availPresetWeekdaysBusy90 = async function() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today); d.setDate(today.getDate()+i);
    if (d.getDay() >= 1 && d.getDay() <= 5) dates.push(isoFromDate(d));
  }
  await applyAvailability(dates, 'busy');
  renderContractorAvailability();
};
window.availPresetClear90 = async function() {
  if (!confirm('Clear all availability for the next 3 months?')) return;
  const start = todayISO();
  const end = isoFromDate(new Date(Date.now()+90*24*60*60*1000));
  try {
    const { error } = await sb.rpc('c_clear_availability', { p_start: start, p_end: end });
    if (error) throw error;
    toast('Cleared');
    renderContractorAvailability();
  } catch (e) { toast(e.message || 'Clear failed', {error:true}); }
};

function docItemHtml(d, ownerCanDelete) {
  const expWarning = d.expires_on && daysFromToday(d.expires_on) <= 30
    ? `<span class="badge ${daysFromToday(d.expires_on)<0?'b-danger':'b-warn'}" style="margin-left:6px;">Expires ${fmtDateShort(d.expires_on)}</span>`
    : (d.expires_on ? `<span style="margin-left:6px;color:var(--muted);font-size:.74rem;">exp ${fmtDateShort(d.expires_on)}</span>` : '');
  return `
    <div class="doc-item">
      <div class="doc-icon">📄</div>
      <div class="doc-meta">
        <div class="doc-name">${esc(d.file_name)}${expWarning}</div>
        <div class="doc-sub">${esc(d.document_type.replace('_',' '))} · uploaded ${esc(fmtDateShort(d.uploaded_at))}</div>
      </div>
      <div class="doc-actions">
        <button class="btn btn-outline btn-sm" onclick="viewDoc('${d.file_path.replace(/'/g,"\\'")}')">View</button>
        ${ownerCanDelete ? `<button class="btn btn-danger btn-sm" onclick="confirmDeleteDoc('${d.id}','${d.file_path.replace(/'/g,"\\'")}')">Delete</button>` : ''}
      </div>
    </div>
  `;
}

window.viewDoc = async function(filePath) {
  try {
    const url = await downloadDocumentURL(filePath);
    window.open(url, '_blank');
  } catch (e) { toast(e.message || 'Download failed', {error:true}); }
};

window.confirmDeleteDoc = function(id, filePath) {
  openModal('Delete document?', '<p style="font-size:.92rem;">This deletes the file permanently. Continue?</p>', [
    { label:'Cancel', cls:'btn-outline', onClick: closeModal },
    { label:'Delete', cls:'btn-danger', onClick: async () => {
      try {
        await deleteDocument({ id, file_path: filePath });
        closeModal();
        toast('Deleted');
        refreshActiveSection();
      } catch (e) { toast(e.message || 'Delete failed', {error:true}); }
    }}
  ]);
};

window.uploadDoc = async function() {
  const f = $('doc-file').files[0];
  const t = $('doc-type').value;
  const exp = $('doc-exp').value || null;
  if (!f) { toast('Pick a file first', {error:true}); return; }
  try {
    await uploadDocument({ file: f, document_type: t, expires_on: exp });
    toast('Uploaded');
    refreshActiveSection();
  } catch (e) { toast(e.message || 'Upload failed', {error:true}); }
};

window.saveProfile = async function() {
  const updates = {
    first_name: v('p-first'),
    last_name:  v('p-last'),
    phone:      v('p-phone'),
    address_line1: v('p-addr1'),
    address_line2: v('p-addr2'),
    city:       v('p-city'),
    state:      v('p-state'),
    postal_code:v('p-zip'),
    emergency_contact_name:  v('p-ec-name'),
    emergency_contact_phone: v('p-ec-phone'),
    emergency_contact_relationship: v('p-ec-rel'),
    food_handler_card_expires: v('p-food-exp') || null
  };
  try {
    const { error } = await sb.from('c_contractors').update(updates).eq('id', session.contractor.id);

    Object.assign(session.contractor, updates);
    toast('Profile saved');
    renderNotifBanner();
  } catch (e) { toast(e.message || 'Save failed', {error:true}); }
};

            <div style="font-size:.85rem;color:#7d6608;margin-top:6px;">${owedRows.length} contractor${owedRows.length===1?'':'s'} owed${owedNames.length?' &middot; '+esc(owedNames.slice(0,5).join(', '))+(owedNames.length>5?` +${owedNames.length-5} more`:''):''}</div>
          </div>
          <button class="btn btn-primary" onclick="showSection('a-payments')">Pay now</button>
        </div>
      </div>
    ` : `
      <div class="panel" style="border-left:4px solid var(--accent);">
        <div style="font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--brown-dk);">All caught up &mdash; nothing outstanding.</div>

      <div class="stat-card"><div class="sl">Hours YTD</div><div class="sv">${totalHours.toFixed(1)}</div><div class="sh">approved</div></div>

function adminShiftCardHtml(s) {
  const statusBadge =
    s.status === 'cancelled' ? '<span class="badge b-cancelled">Cancelled</span>' :
    s.status === 'completed' ? '<span class="badge b-completed">Completed</span>' :
    s.spots_left === 0 ? '<span class="badge b-active">Full</span>' :
    '<span class="badge b-pending">'+s.spots_left+' open</span>';
  return `
    <div class="card">
      <div class="card-hd">
        <div>
          <h3>${esc(fmtDateShort(s.bake_date))} · ${esc(fmtTime(s.start_time))}${s.end_time?'–'+esc(fmtTime(s.end_time)):''}</h3>
          <div class="card-sub">📍 ${esc(s.location)}</div>
        </div>
        ${statusBadge}
      </div>
      ${s.notes ? `<div class="card-body" style="font-size:.84rem;">${esc(s.notes)}</div>` : ''}

        <span><strong>${s.spots_filled} / ${s.spots_total}</strong> signed up</span>

      <div class="card-actions">
        <button class="btn btn-outline btn-sm" onclick="adminOpenShiftDetail('${s.id}')">View / edit</button>

      </div>
    </div>
  `;
}

function renderAdminAvailabilityGrid(byDate) {
  const info = monthInfo(_adminAvState.year, _adminAvState.month);
  $('aa-month-label').textContent = info.monthLabel;
  const grid = $('aa-grid');
  const today = todayISO();
  grid.innerHTML = info.cells.map(c => {
    if (c.blank) return '<div class="cal-day cd-blank"></div>';
    const counts = byDate[c.iso] || { free_count:0, busy_count:0, tentative_count:0, total_active:0 };
    const cls = ['cal-day','cd-heat'];
    if (c.iso < today) cls.push('cd-past');
    if (c.iso === today) cls.push('cd-today');
    // Heatmap color: more free = greener
    const free = counts.free_count;
    if (free >= 4)      cls.push('cd-free');
    else if (free >= 2) cls.push('cd-tentative');
    else if (free === 0 && counts.busy_count > 0) cls.push('cd-busy');
    return `
      <div class="${cls.join(' ')}" onclick="adminAvailOpenDate('${c.iso}')">
        <div class="cal-day-num">${c.day}</div>
        <div class="cd-counts">
          <span class="free-c">${counts.free_count}f</span>
          ${counts.busy_count?`· <span class="busy-c">${counts.busy_count}b</span>`:''}
        </div>
      </div>
    `;
  }).join('');
}

};

    return `<ul style="list-style:none;padding:0;margin:0 0 12px;">${arr.map(r => `

};

        : rows.map(r => `
          <div class="audit-item">
            <div>
              <span class="audit-action">${esc(r.action)}</span>
              <strong>${esc(r.actor_email||'system')}</strong>
              <span class="audit-time">· ${esc(fmtDateShort(r.created_at))} ${new Date(r.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            <div class="audit-time">${esc(r.entity_type)} · ${esc((r.entity_id||'').slice(0,8))}…</div>
            ${r.before && r.after ? `<details style="margin-top:4px;"><summary style="font-size:.74rem;color:var(--muted);cursor:pointer;">View diff</summary><div class="audit-diff">${esc(JSON.stringify(diffJson(r.before, r.after), null, 2))}</div></details>` : ''}
          </div>
        `).join('')}
    </div>
  `;
}

function diffJson(before, after) {
  const out = {};
  for (const k of new Set([...Object.keys(before||{}), ...Object.keys(after||{})])) {
    if (JSON.stringify(before?.[k]) !== JSON.stringify(after?.[k])) {
      out[k] = { from: before?.[k], to: after?.[k] };
    }
  }
  return Object.keys(out).length ? out : '(no field changes)';
}

window.saveSettings = async function() {
  const updates = [
    { key:'default_shift_location',   value:v('set-loc') },
    { key:'default_shift_start_time', value:v('set-start') },
    { key:'default_shift_end_time',   value:v('set-end') },
    { key:'portal_url',               value:v('set-url') },
    { key:'stale_availability_days',  value:v('set-stale') }
  ];
  try {
    for (const u of updates) {
      const { error } = await sb.from('c_settings').upsert(u);
      if (error) throw error;
    }
    toast('Saved');
  } catch (e) { toast(e.message || 'Save failed', {error:true}); }
};

window.runCompletePastShifts = async function() {
  try {
    const { data, error } = await sb.rpc('c_complete_past_shifts');
    if (error) throw error;
    toast(`${data||0} shift${data===1?'':'s'} marked completed`);
  } catch (e) { toast(e.message || 'Failed', {error:true}); }
};

      contractor_id: session.contractor.id,
      referee_name: name,

      comments
    });

window.openContractorHistory = async function(contractorId) {
  openModal('Loading history...', '<p style="color:var(--muted);">Fetching...</p>', [
    { label:'Close', cls:'btn-outline', onClick: closeModal }
  ]);
  const [contractor, hours, payments] = await Promise.all([
    sb.from('c_contractors').select('*').eq('id', contractorId).single().then(r => r.data),
    sb.from('c_hour_submissions').select('*, shift:c_shifts(bake_date, location)').eq('contractor_id', contractorId).order('approved_at', { ascending: false, nullsFirst: false }),
    sb.from('c_payments').select('*').eq('contractor_id', contractorId).order('paid_on', { ascending: false })
  ]);
  const hoursRows = hours.data || [];
  const payRows = payments.data || [];
  const totalHours = hoursRows.reduce((s,h) => s + (h.status==='approved' ? Number(h.approved_hours||0) : 0), 0);
  const totalEarned = hoursRows.reduce((s,h) => s + (h.status==='approved' ? Number(h.approved_amount||0) : 0), 0);
  const totalPaid = payRows.reduce((s,p) => s + Number(p.amount||0), 0);
  const timeline = [];
  hoursRows.forEach(h => {
    timeline.push({
      date: h.approved_at || h.submitted_at,
      sortKey: h.approved_at || h.submitted_at,
      type: 'hours',
      label: `${h.approved_hours||h.submitted_hours} hrs · ${h.shift ? fmtDateShort(h.shift.bake_date) + ' bake' : 'shift'}`,
      amount: h.status==='approved' ? Number(h.approved_amount||0) : null,
      status: h.status
    });
  });
  payRows.forEach(p => {
    timeline.push({
      date: p.paid_on,
      sortKey: p.paid_on + 'T23:00:00',
      type: 'payment',
      label: `Paid · ${p.method}${p.reference ? ' · ' + p.reference : ''}`,
      amount: -Number(p.amount||0),
      status: 'paid'
    });
  });
  timeline.sort((a,b) => (b.sortKey||'').localeCompare(a.sortKey||''));

  openModal(`${contractor.first_name||''} ${contractor.last_name||''} — Full history`, `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;">
      <div class="stat-card" style="border-top-color:var(--accent);"><div class="sl">Total hours</div><div class="sv">${totalHours.toFixed(1)}</div></div>
      <div class="stat-card" style="border-top-color:var(--accent);"><div class="sl">Total earned</div><div class="sv">${fmtCur(totalEarned)}</div></div>
      <div class="stat-card" style="border-top-color:var(--accent);"><div class="sl">Total paid</div><div class="sv">${fmtCur(totalPaid)}</div></div>
    </div>
    ${Math.abs(totalEarned - totalPaid) > 0.01 ? `
      <p style="font-size:.84rem;color:${totalEarned > totalPaid ? 'var(--danger)' : 'var(--muted)'};">
        ${totalEarned > totalPaid ? `Currently owed: <strong>${fmtCur(totalEarned - totalPaid)}</strong>` : `Overpaid by: ${fmtCur(totalPaid - totalEarned)}`}
      </p>
    ` : ''}
    <div style="font-weight:700;font-size:.76rem;text-transform:uppercase;letter-spacing:.08em;color:var(--brown-dk);margin:14px 0 6px;">Timeline</div>
    ${timeline.length === 0 ? '<p style="color:var(--muted);font-size:.9rem;">No history yet.</p>' : `
      <div style="max-height:50vh;overflow-y:auto;border:1px solid var(--tan);border-radius:4px;">
        ${timeline.map(t => `
          <div style="padding:8px 12px;border-bottom:1px solid var(--cream-dk);display:flex;align-items:center;gap:10px;font-size:.86rem;">
            <span style="min-width:80px;color:var(--muted);font-size:.78rem;">${esc(fmtDateShort(t.date))}</span>
            <span style="flex:1;color:var(--brown-dk);">${esc(t.label)}</span>
            ${t.amount !== null ? `<span style="font-weight:700;color:${t.amount < 0 ? 'var(--accent-dk)' : 'var(--brown-dk)'};min-width:90px;text-align:right;">${t.amount < 0 ? '-' : ''}${fmtCur(Math.abs(t.amount))}</span>` : '<span></span>'}
            <span style="min-width:80px;text-align:right;"><span class="badge b-${t.status==='paid'?'paid':t.status==='approved'?'approved':'pending'}" style="font-size:.66rem;">${esc(t.status)}</span></span>
          </div>
        `).join('')}
      </div>
    `}
  `, [
    { label:'Close', cls:'btn-outline', onClick: closeModal },
    { label:'Edit contractor', cls:'btn-primary', onClick: () => { closeModal(); openEditContractorModal(contractorId); }}
  ]);
};

window.addStartTimeRow = function() {
  const container = document.getElementById('ns-extra-starts');
  if (!container) return;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-top:6px;';
  row.innerHTML = `
    <input type="time" class="ns-extra-start" style="padding:8px 10px;border:1px solid var(--tan);border-radius:4px;flex:1;" />
    <button type="button" onclick="this.parentNode.remove()" style="background:none;border:none;color:var(--danger);font-size:1.2rem;cursor:pointer;">×</button>
  `;
  container.appendChild(row);
};

function collectStartTimes() {
  const primary = (v('ns-start') || '').trim();
  if (!primary) return null;
  const extras = Array.from(document.querySelectorAll('.ns-extra-start'))
    .map(el => el.value.trim()).filter(Boolean);
  if (extras.length === 0) return null;
  return [primary, ...extras];
}

window.openSignupStartPicker = async function(shiftId) {
  const { data: shift } = await sb.from('c_shifts').select('*').eq('id', shiftId).single();
  if (!shift || !shift.start_times || shift.start_times.length === 0) {
    return signUpForShift(shiftId);
  }
  openModal(`Pick your start time · ${fmtDateShort(shift.bake_date)}`, `
    <p style="font-size:.92rem;color:var(--brown-dk);margin-bottom:14px;">This shift has multiple start times. Which works for you?</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${shift.start_times.map((t, i) => `
        <label style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--tan);border-radius:4px;cursor:pointer;background:var(--cream-lt);">
          <input type="radio" name="signup-start" value="${esc(t)}" ${i===0?'checked':''} />
          <strong style="font-size:1rem;">${esc(fmtTime(t))}</strong>
        </label>
      `).join('')}
    </div>
  `, [
    { label:'Cancel', cls:'btn-outline', onClick: closeModal },
    { label:'Sign up', cls:'btn-primary', onClick: async () => {
      const chosen = document.querySelector('input[name="signup-start"]:checked')?.value;
      try {
        await contractorSignUpForShift(shiftId, chosen);
        closeModal();
        toast('Signed up');
        refreshActiveSection();
      } catch (e) { toast(e.message || 'Sign-up failed', {error:true}); }
    }}
  ]);
};

window.adminPromoteShift = async function(shiftId) {
  if (!confirm('Promote this tentative shift to Open? Contractors will be notified.')) return;
  try {
    await sb.from('c_shifts').update({ status: 'open' }).eq('id', shiftId);
    const { data: shift } = await sb.from('c_shifts').select('*').eq('id', shiftId).single();
    const contractors = await loadAllContractors({ activeOnly:true });
    const others = contractors.filter(c => c.role !== 'admin');
    await notifyMany('shift_new', others, c => ({
      to_email:   c.email,
      first_name: c.first_name,
      bake_date:  fmtDate(shift.bake_date),
      start_time: fmtTime(shift.start_time),
      location:   shift.location,
      spots_total:String(shift.spots_total),
      shift_notes:shift.notes || '(none)',
      portal_url: PORTAL_URL
    }));
    toast('Shift promoted to open — contractors notified');
    refreshActiveSection();
  } catch (e) { toast(e.message || 'Failed', {error:true}); }
};
